name: Coverage

on:
  push:
    branches: [clean-main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: 18
        run: npm install
        run: npm run test:coverage
        run: npm install -g coveralls
        run: cat coverage/lcov.info | coveralls --repo-token=${{ secrets.COVERALLS_REPO_TOKEN }}