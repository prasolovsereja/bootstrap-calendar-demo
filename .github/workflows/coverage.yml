name: Coverage

on:
  push:
    branches: [clean-main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install dependencies, npm test-Coverage
        run: |
          npm install
          npm run test:coverage

      - name: Coveralls
        uses: coverallsapp/github-action@v2
